name: Daily Tech News

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 8:00 UTC 运行（可根据时区调整）
  workflow_dispatch:     # 允许手动触发

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run news fetcher and sender
        env:
          # API 配置
          API_KEY: ${{ secrets.API_KEY }}
          MODEL: ${{ secrets.MODEL || 'glm-4-flash' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
          MAX_TOKENS: ${{ secrets.MAX_TOKENS || '2000' }}
          TIMEOUT: ${{ secrets.TIMEOUT || '60' }}
          MAX_RETRIES: ${{ secrets.MAX_RETRIES || '3' }}

          # 邮件配置
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS || 'true' }}

          # 新闻数量配置
          MAX_TECH_NEWS: ${{ secrets.MAX_TECH_NEWS || '10' }}
          MAX_AI_NEWS: ${{ secrets.MAX_AI_NEWS || '10' }}
          MAX_GITHUB_REPOS: ${{ secrets.MAX_GITHUB_REPOS || '10' }}
        run: |
          python src/main.py